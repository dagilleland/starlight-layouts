name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-flight run finish rather than
# canceling it, so Pages never ends up serving a half-deployed build.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      # Installs every workspace package (the site app + all 4 layout
      # packages) from the single root pnpm-lock.yaml.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Proxies to `apps/site`'s `astro build` — same command used locally.
      - name: Build site
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # `include-hidden-files: true` is required as of v4 of this action —
      # it excludes dotfiles by default, which would otherwise silently
      # drop `apps/site/public/.nojekyll` from the deployed artifact and
      # bring back the Jekyll-strips-`_astro/` asset-loading failure that
      # file exists to prevent.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/site/dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
